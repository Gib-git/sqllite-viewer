services:
  sqlite-viewer:
    build: .
    ports:
      - "3010:3000"
    volumes:
      # Mount the host home directory at the same path so the file browser
      # sees identical paths to what's on the host machine.
      - ${HOME}:${HOME}

      # Uncomment to also expose external drives on macOS:
      # - /Volumes:/Volumes

      # Uncomment to expose the full Linux home tree:
      - /home:/home

      # Persistent storage for uploaded files
      - uploads:/app/uploads
    environment:
      # Keeps os.homedir() pointing at the real host home directory
      - HOME=${HOME}
      - PORT=3000
    restart: unless-stopped

volumes:
  uploads:
