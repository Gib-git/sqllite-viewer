services:
  sqlite-viewer:
    build: .
    container_name: sqlite-viewer
    ports:
      - "3010:3000"
    volumes:
      - /root:/root           # ZimaOS root user home
      - /home:/home           # all other user home directories
      - /DATA:/DATA           # ZimaOS main storage
      - /media:/media         # USB drives / external media
      - /mnt:/mnt             # other mounted filesystems
      - uploads:/app/uploads  # uploaded files (persisted across restarts)
    environment:
      - HOME=/root
      - PORT=3000
    restart: unless-stopped

volumes:
  uploads:
